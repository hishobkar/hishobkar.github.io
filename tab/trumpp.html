<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Reading</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        background: white;
        color: #222;
        font-family: Georgia, serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 40px;
    }

    .container {
        max-width: 900px;
        text-align: center;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 20px;
        font-weight: normal;
    }

    p {
        font-size: 1.2rem;
        line-height: 1.8;
        text-align: justify;
    }

    .loading {
        color: #777;
        font-style: italic;
    }
</style>
</head>

<body>

<div class="container">
    <h1 id="title">Loading...</h1>
    <p id="content" class="loading">
        Fetching today's reading...
    </p>
</div>

<script>
// Wake Lock
let wakeLock = null;

async function requestWakeLock() {
    try {
        wakeLock = await navigator.wakeLock.request("screen");
    } catch (err) {
        console.log(err);
    }
}

requestWakeLock();

document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
        requestWakeLock();
    }
});

// Fetch random Wikipedia article
async function loadArticle() {
    try {
        const response = await fetch(
            "https://en.wikipedia.org/api/rest_v1/page/random/summary"
        );

        const data = await response.json();

        document.getElementById("title").textContent =
            data.title || "Interesting Read";

        document.getElementById("content").textContent =
            data.extract || "No summary available.";
    } catch (e) {
        document.getElementById("title").textContent =
            "Unable to Load";

        document.getElementById("content").textContent =
            "Please refresh and try again.";
    }
}

loadArticle();
</script>

</body>
</html>
