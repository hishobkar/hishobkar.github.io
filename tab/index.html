<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>India Clock Fullscreen</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    color: #fff;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}

.clock-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
}

#time {
    font-size: 170px;
    font-weight: bold;
}

#date {
    font-size: 80px;
}

.fake-cursor {
    position: fixed;
    width: 16px;
    height: 16px;
    background: rgba(255,255,255,0.8);
    border-radius: 50%;
    z-index: 20;
}

#fsBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 30;
    background: #000;
    color: #fff;
    border: 1px solid #555;
    padding: 6px 10px;
    font-size: 12px;
}
</style>
</head>

<body>

<!-- Bubble background -->
<canvas id="bubbleCanvas"></canvas>

<!-- Clock -->
<div class="clock-container">
    <div id="time">00:00:00</div>
    <div id="date">01-Jan-1970</div>
</div>

<!-- Fake cursor -->
<div id="fakeCursor" class="fake-cursor"></div>

<!-- Fullscreen button -->
<button id="fsBtn">Fullscreen</button>

<!-- Invisible video (keeps screen awake as much as possible) -->
<video autoplay loop muted playsinline style="display:none">
    <source src="data:video/mp4;base64,AAAAIGZ0eXBtcDQyAAAAAG1wNDFtcDQyaXNvbQAAAAhmcmVlAAACZ21kYXQAAAAAAA==" type="video/mp4">
</video>

<script>
/* ======================
   IST TIME (ES5 SAFE)
====================== */
function pad(n) {
    return (n < 10) ? "0" + n : n;
}

function updateDateTime() {
    var now = new Date();
    var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    var ist = new Date(utc + (5.5 * 60 * 60 * 1000));

    var h = pad(ist.getHours());
    var m = pad(ist.getMinutes());
    var s = pad(ist.getSeconds());

    var day = pad(ist.getDate());
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    var month = months[ist.getMonth()];
    var year = ist.getFullYear();

    document.getElementById("time").innerHTML = h + ":" + m + ":" + s;
    document.getElementById("date").innerHTML = day + "-" + month + "-" + year;
}

setInterval(updateDateTime, 1000);
updateDateTime();

/* ======================
   BUBBLES (CANVAS)
====================== */
var canvas = document.getElementById("bubbleCanvas");
var ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.onresize = resizeCanvas;

var bubbles = [];
var bubbleCount = 30;

for (var i = 0; i < bubbleCount; i++) {
    bubbles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 20 + 10,
        dx: (Math.random() - 0.5) * 0.6,
        dy: (Math.random() - 0.5) * 0.6,
        hue: Math.random() * 360
    });
}

function drawBubbles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (var i = 0; i < bubbles.length; i++) {
        var b = bubbles[i];
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = "hsla(" + b.hue + ",70%,60%,0.3)";
        ctx.fill();

        b.x += b.dx;
        b.y += b.dy;

        if (b.x < 0 || b.x > canvas.width) b.dx *= -1;
        if (b.y < 0 || b.y > canvas.height) b.dy *= -1;
    }

    requestAnimationFrame(drawBubbles);
}
drawBubbles();

/* ======================
   FAKE CURSOR
====================== */
function moveFakeCursor() {
    var c = document.getElementById("fakeCursor");
    var x = Math.random() * (window.innerWidth - 20);
    var y = Math.random() * (window.innerHeight - 20);
    c.style.left = x + "px";
    c.style.top = y + "px";
}

moveFakeCursor();
setInterval(moveFakeCursor, 30000);

/* ======================
   FULLSCREEN (OLD CHROME)
====================== */
document.getElementById("fsBtn").onclick = function () {
    var el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
};
</script>

</body>
</html>
