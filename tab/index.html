<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>India Clock Fullscreen</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

body.dark {
    background: #000;
    color: #fff;
}

body.light {
    background: #fff;
    color: #000;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}

.clock-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 10;
}

#time {
    font-size: 170px;
    font-weight: bold;
}

#date {
    font-weight: bold;
    font-size: 100px;
}

.fake-cursor {
    position: fixed;
    width: 16px;
    height: 16px;
    background: rgba(255,255,255,0.8);
    border-radius: 50%;
    z-index: 20;
}

#fsBtn {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 30;
}

/* UI controls */
.controls {
    position: fixed;
    bottom: 10px;
    left: 10px;
    z-index: 40;
    font-size: 14px;
}

.ampm {
    font-size: 0.5em;
}
</style>
</head>

<body>

<canvas id="bubbleCanvas"></canvas>

<div class="clock-container">
    <div id="time">00:00:00 AM</div>
    <div id="date">01-Jan-1970</div>
</div>

<div id="fakeCursor" class="fake-cursor"></div>
<button id="fsBtn">Fullscreen</button>

<div class="controls">
    Bubble Size:
    <input type="range" id="sizeCtrl" min="20" max="80" value="50"><br>
    Bubble Speed:
    <input type="range" id="speedCtrl" min="1" max="5" value="3">
</div>

<!-- Invisible video keep-awake trick -->
<video autoplay loop muted playsinline style="display:none">
    <source src="data:video/mp4;base64,AAAAIGZ0eXBtcDQyAAAAAG1wNDFtcDQyaXNvbQAAAAhmcmVlAAACZ21kYXQAAAAAAA==" type="video/mp4">
</video>

<script>
/* ======================
   THEME CYCLE + REFRESH
====================== */
var mode = localStorage.getItem("mode") || "dark";
document.body.className = mode;

setTimeout(function () {
    localStorage.setItem("mode", mode === "dark" ? "light" : "dark");
    location.reload();
}, 300000); // 5 minutes

/* ======================
   IST TIME – 12 HOUR
====================== */
function pad(n) { return n < 10 ? "0" + n : n; }

function updateDateTime() {
    var now = new Date();
    var utc = now.getTime() + (now.getTimezoneOffset() * 60000);
    var ist = new Date(utc + 19800000);

    var h = ist.getHours();
    var ampm = h >= 12 ? "PM" : "AM";
    h = h % 12;
    if (h === 0) h = 12;

    var m = pad(ist.getMinutes());
    var s = pad(ist.getSeconds());

    var day = pad(ist.getDate());
    var months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

    document.getElementById("time").innerHTML = pad(h) + ":" + m + ":" + s + " <span class=\"ampm\">" + ampm + "</span>";
    document.getElementById("date").innerHTML = day + "-" + months[ist.getMonth()] + "-" + ist.getFullYear();
}

setInterval(updateDateTime, 1000);
updateDateTime();

/* ======================
   BUBBLES (CONFIGURABLE)
====================== */
var canvas = document.getElementById("bubbleCanvas");
var ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.onresize = resizeCanvas;

var bubbles = [];
var bubbleCount = 30;
var baseSize = 80;
var speedFactor = 10;

for (var i = 0; i < bubbleCount; i++) {
    bubbles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * baseSize + 20,
        dx: (Math.random() - 0.5) * speedFactor,
        dy: (Math.random() - 0.5) * speedFactor,
        hue: Math.random() * 360
    });
}

function drawBubbles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (var i = 0; i < bubbles.length; i++) {
        var b = bubbles[i];
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fillStyle = "hsla(" + b.hue + ",70%,60%,0.35)";
        ctx.fill();

        b.x += b.dx;
        b.y += b.dy;

        if (b.x < 0 || b.x > canvas.width) b.dx *= -1;
        if (b.y < 0 || b.y > canvas.height) b.dy *= -1;
    }
    requestAnimationFrame(drawBubbles);
}
drawBubbles();

/* UI controls */
document.getElementById("sizeCtrl").oninput = function () {
    baseSize = this.value;
    for (var i = 0; i < bubbles.length; i++) {
        bubbles[i].r = Math.random() * baseSize + 20;
    }
};

document.getElementById("speedCtrl").oninput = function () {
    speedFactor = this.value;
    for (var i = 0; i < bubbles.length; i++) {
        bubbles[i].dx = (Math.random() - 0.5) * speedFactor;
        bubbles[i].dy = (Math.random() - 0.5) * speedFactor;
    }
};

/* ======================
   FAKE CURSOR
====================== */
function moveFakeCursor() {
    var c = document.getElementById("fakeCursor");
    c.style.left = Math.random() * window.innerWidth + "px";
    c.style.top = Math.random() * window.innerHeight + "px";
}
setInterval(moveFakeCursor, 30000);
moveFakeCursor();

/* ======================
   FULLSCREEN
====================== */
document.getElementById("fsBtn").onclick = function () {
    var el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
};
</script>

</body>
</html>
