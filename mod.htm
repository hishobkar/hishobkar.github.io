<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Reading</title>

<style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        background: white;
        color: #222;
        font-family: Georgia, serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 40px;
    }

    .container {
    max-width: 900px;
    text-align: left;
    }

    #content {
        white-space: pre-line;
        line-height: 1.9;
        font-size: 1.15rem;
    }

    h1 {
        font-size: 2rem;
        margin-bottom: 20px;
        font-weight: normal;
    }

    p {
        font-size: 1.2rem;
        line-height: 1.8;
        text-align: justify;
    }

    .loading {
        color: #777;
        font-style: italic;
    }
</style>
</head>

<body>

<div class="container">
    <h1 id="title">Loading...</h1>
    <p id="content" class="loading">
        Fetching today's reading...
    </p>
</div>

<script>
// Wake Lock
let wakeLock = null;

async function requestWakeLock() {
    try {
        wakeLock = await navigator.wakeLock.request("screen");
    } catch (err) {
        console.log(err);
    }
}

requestWakeLock();

document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
        requestWakeLock();
    }
});

// Fetch random Wikipedia article
async function loadArticle() {
    try {
        // Get random article
        const randomResp = await fetch(
            "https://en.wikipedia.org/api/rest_v1/page/random/summary"
        );
        const randomData = await randomResp.json();

        const title = randomData.title;

        // Get full article HTML
        const articleResp = await fetch(
            `https://en.wikipedia.org/api/rest_v1/page/html/${encodeURIComponent(title)}`
        );

        const html = await articleResp.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        // Collect paragraphs
        const paragraphs = [...doc.querySelectorAll("p")]
            .map(p => p.textContent.trim())
            .filter(text => text.length > 50);

        // Take first 8-15 paragraphs
        const content = paragraphs.slice(0, 12).join("\n\n");

        document.getElementById("title").textContent = title;
        document.getElementById("content").textContent = content;

    } catch (err) {
        console.error(err);
    }
}

loadArticle();
</script>

</body>
</html>
